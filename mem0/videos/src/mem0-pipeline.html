<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="mem0-pipeline" data-width="1920" data-height="540" data-start="0" data-duration="12">
  <div class="scene">

    <!-- ======= PHASE 1: EXTRACTION (left half) ======= -->
    <div class="phase phase-extract">
      <div class="phase-header">
        <div class="phase-num">1</div>
        <div class="phase-label extract-label">EXTRACTION</div>
      </div>

      <!-- Chat bubble -->
      <div class="chat-msg" id="chat-msg">
        <div class="msg-icon">U</div>
        <div class="msg-text">I'm vegetarian and I avoid dairy</div>
      </div>

      <!-- Down arrow -->
      <svg class="flow-arrow arrow-down" id="arrow-extract" viewBox="0 0 40 60" width="40" height="60">
        <line x1="20" y1="0" x2="20" y2="48" stroke="#415A77" stroke-width="3"/>
        <polygon points="10,44 20,58 30,44" fill="#415A77"/>
      </svg>

      <!-- LLM box -->
      <div class="llm-box" id="llm-box">
        <div class="llm-icon">LLM</div>
        <div class="llm-label">Extracts structured facts</div>
        <div class="llm-glow"></div>
      </div>

      <!-- Down arrow -->
      <svg class="flow-arrow arrow-down" id="arrow-fact" viewBox="0 0 40 60" width="40" height="60">
        <line x1="20" y1="0" x2="20" y2="48" stroke="#415A77" stroke-width="3"/>
        <polygon points="10,44 20,58 30,44" fill="#415A77"/>
      </svg>

      <!-- Output fact pill -->
      <div class="fact-pill" id="fact-pill">
        <span class="fact-dot"></span>
        Vegetarian, avoids dairy
      </div>
    </div>

    <!-- ======= CENTER ARROW ======= -->
    <svg class="phase-arrow" id="phase-arrow" viewBox="0 0 120 60" width="120" height="60">
      <line x1="0" y1="30" x2="100" y2="30" stroke="#415A77" stroke-width="4" stroke-dasharray="10 6"/>
      <polygon points="96,18 120,30 96,42" fill="#415A77"/>
    </svg>

    <!-- ======= PHASE 2: UPDATE (right half) ======= -->
    <div class="phase phase-update">
      <div class="phase-header">
        <div class="phase-num num-orange">2</div>
        <div class="phase-label update-label">UPDATE</div>
      </div>

      <!-- Compare zone -->
      <div class="compare-zone" id="compare-zone">
        <div class="compare-new" id="compare-new">
          <span class="compare-tag">NEW</span>
          Vegetarian, avoids dairy
        </div>
        <div class="compare-vs">vs</div>
        <div class="compare-existing" id="compare-existing">
          <div class="mem-row"><span class="mem-dot"></span>Likes Italian food</div>
          <div class="mem-row"><span class="mem-dot"></span>Prefers morning meetings</div>
        </div>
      </div>

      <!-- Down arrow -->
      <svg class="flow-arrow arrow-down" id="arrow-ops" viewBox="0 0 40 48" width="40" height="48">
        <line x1="20" y1="0" x2="20" y2="36" stroke="#415A77" stroke-width="3"/>
        <polygon points="10,32 20,46 30,32" fill="#415A77"/>
      </svg>

      <!-- LLM decides label -->
      <div class="decide-label" id="decide-label">LLM decides operation</div>

      <!-- Operation badges -->
      <div class="ops-row" id="ops-row">
        <div class="op op-add" id="op-add">ADD</div>
        <div class="op op-update" id="op-update">UPDATE</div>
        <div class="op op-delete" id="op-delete">DELETE</div>
        <div class="op op-noop" id="op-noop">NOOP</div>
      </div>
    </div>

    <!-- ======= BOTTOM TAKEAWAY ======= -->
    <div class="takeaway" id="takeaway">Memory stays clean and current</div>

  </div>

  <style>
    [data-composition-id="mem0-pipeline"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px;
      font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene {
      position: relative; width: 1920px; height: 540px;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px 60px 0;
      gap: 0;
    }

    /* ── Phase containers ── */
    .phase {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding-top: 6px;
    }
    /* Left: 80px..860px = 780px wide, centred at 470 */
    .phase-extract { width: 720px; flex-shrink: 0; }
    /* Right: 1000px..1860px = 860px wide, centred at 1430 */
    .phase-update { width: 780px; flex-shrink: 0; }

    /* ── Phase header ── */
    .phase-header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
    .phase-num {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      background: rgba(46,196,182,0.18); border: 2px solid #2EC4B6; color: #2EC4B6;
    }
    .phase-num.num-orange {
      background: rgba(255,159,28,0.18); border-color: #FF9F1C; color: #FF9F1C;
    }
    .phase-label { font-size: 28px; font-weight: 700; letter-spacing: 3px; }
    .extract-label { color: #2EC4B6; }
    .update-label { color: #FF9F1C; }

    /* ── Chat message ── */
    .chat-msg {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 24px; border-radius: 14px;
      background: rgba(46,196,182,0.08); border: 2px solid rgba(46,196,182,0.35);
      max-width: 540px;
    }
    .msg-icon {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      background: #2EC4B6; color: #011627;
    }
    .msg-text { font-size: 22px; color: #FDFFFC; line-height: 1.3; }

    /* ── Flow arrows ── */
    .flow-arrow { flex-shrink: 0; }

    /* ── LLM box ── */
    .llm-box {
      position: relative;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 32px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,159,28,0.12) 0%, rgba(188,140,255,0.10) 100%);
      border: 2px solid #FF9F1C;
    }
    .llm-icon {
      padding: 6px 16px; border-radius: 6px; font-size: 20px; font-weight: 700;
      background: rgba(255,159,28,0.25); color: #FF9F1C;
    }
    .llm-label { font-size: 20px; color: #FDFFFC; }
    .llm-glow {
      position: absolute; inset: -4px; border-radius: 16px;
      box-shadow: 0 0 30px rgba(255,159,28,0.35); opacity: 0; pointer-events: none;
    }

    /* ── Fact pill ── */
    .fact-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 28px; border-radius: 28px;
      background: linear-gradient(135deg, rgba(63,185,80,0.15) 0%, rgba(46,196,182,0.10) 100%);
      border: 2px solid #3fb950; color: #3fb950;
      font-size: 22px; font-weight: 700;
    }
    .fact-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #3fb950; flex-shrink: 0;
    }

    /* ── Center arrow ── */
    .phase-arrow {
      flex-shrink: 0; align-self: center; margin: 0 16px; margin-top: 180px;
    }

    /* ── Compare zone ── */
    .compare-zone {
      display: flex; align-items: center; gap: 18px;
      padding: 14px 24px; border-radius: 12px;
      background: rgba(253,255,252,0.03); border: 1px solid rgba(65,90,119,0.4);
    }
    .compare-new {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      background: rgba(63,185,80,0.10); border: 2px solid #3fb950;
      font-size: 18px; font-weight: 700; color: #3fb950;
      white-space: nowrap;
    }
    .compare-tag {
      padding: 2px 10px; border-radius: 4px; font-size: 14px; font-weight: 700;
      background: #3fb950; color: #011627; margin-right: 4px;
    }
    .compare-vs {
      font-size: 22px; color: #415A77; font-weight: 700; flex-shrink: 0;
    }
    .compare-existing {
      display: flex; flex-direction: column; gap: 6px;
    }
    .mem-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 8px;
      background: rgba(119,141,169,0.08); border: 1px solid rgba(119,141,169,0.25);
      font-size: 16px; color: #778DA9; white-space: nowrap;
    }
    .mem-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #415A77; flex-shrink: 0;
    }

    /* ── Decide label ── */
    .decide-label {
      font-size: 18px; color: #778DA9; font-weight: 400;
    }

    /* ── Operation badges ── */
    .ops-row { display: flex; gap: 14px; }
    .op {
      padding: 14px 32px; border-radius: 10px; font-size: 22px; font-weight: 700;
      letter-spacing: 1px; position: relative; overflow: hidden;
    }
    .op-add {
      background: rgba(63,185,80,0.12); border: 2px solid #3fb950; color: #3fb950;
    }
    .op-update {
      background: rgba(88,166,255,0.12); border: 2px solid #58a6ff; color: #58a6ff;
    }
    .op-delete {
      background: rgba(231,29,54,0.12); border: 2px solid #E71D36; color: #E71D36;
    }
    .op-noop {
      background: rgba(65,90,119,0.18); border: 2px solid #415A77; color: #778DA9;
    }

    /* ── Bottom takeaway ── */
    .takeaway {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      font-size: 24px; font-weight: 700; color: #778DA9;
      padding: 8px 36px; border-radius: 8px;
      background: rgba(65,90,119,0.12); border: 1px solid rgba(65,90,119,0.3);
      white-space: nowrap;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    /* ── Helpers ── */
    var $ = function(sel) { return root.querySelector(sel); };
    var $$ = function(sel) { return root.querySelectorAll(sel); };

    /* ============================================================
       PHASE 1 — EXTRACTION  (0s – 4.5s)
       ============================================================ */

    // Phase header fades in
    tl.from($('.phase-extract .phase-header'), {
      opacity: 0, x: -30, duration: 0.6, ease: 'power3.out'
    }, 0.2);

    // Chat message slides in from left
    tl.from($('#chat-msg'), {
      opacity: 0, x: -50, scale: 0.95, duration: 0.7, ease: 'back.out(1.4)'
    }, 0.7);

    // First down arrow draws in
    tl.from($('#arrow-extract'), {
      opacity: 0, scaleY: 0, transformOrigin: 'top center', duration: 0.4, ease: 'power2.out'
    }, 1.5);

    // LLM box appears with glow pulse
    tl.from($('#llm-box'), {
      opacity: 0, scale: 0.85, duration: 0.6, ease: 'power2.out'
    }, 2.0);
    tl.to($('#llm-box .llm-glow'), {
      opacity: 1, duration: 0.3, ease: 'power1.in'
    }, 2.3);
    tl.to($('#llm-box .llm-glow'), {
      opacity: 0, duration: 0.6, ease: 'power1.out'
    }, 2.7);

    // Second down arrow
    tl.from($('#arrow-fact'), {
      opacity: 0, scaleY: 0, transformOrigin: 'top center', duration: 0.4, ease: 'power2.out'
    }, 3.1);

    // Fact pill pops in
    tl.from($('#fact-pill'), {
      opacity: 0, scale: 0.7, y: 10, duration: 0.6, ease: 'elastic.out(1, 0.6)'
    }, 3.5);

    // Fact pill glow
    tl.to($('#fact-pill'), {
      boxShadow: '0 0 24px rgba(63,185,80,0.5)', duration: 0.4, ease: 'power1.in'
    }, 3.9);
    tl.to($('#fact-pill'), {
      boxShadow: '0 0 0px rgba(63,185,80,0)', duration: 0.8, ease: 'power2.out'
    }, 4.3);

    /* ============================================================
       CENTER ARROW  (4.2s – 4.8s)
       ============================================================ */
    tl.from($('#phase-arrow'), {
      opacity: 0, scaleX: 0, transformOrigin: 'left center', duration: 0.6, ease: 'power3.out'
    }, 4.2);

    /* ============================================================
       PHASE 2 — UPDATE  (4.6s – 9.5s)
       ============================================================ */

    // Phase header
    tl.from($('.phase-update .phase-header'), {
      opacity: 0, x: 30, duration: 0.6, ease: 'power3.out'
    }, 4.6);

    // Compare zone container
    tl.from($('#compare-zone'), {
      opacity: 0, y: 15, duration: 0.5, ease: 'power2.out'
    }, 5.0);

    // New fact inside compare
    tl.from($('#compare-new'), {
      opacity: 0, x: -20, duration: 0.5, ease: 'power2.out'
    }, 5.3);

    // Existing memory rows stagger in
    $$('.mem-row').forEach(function(el, i) {
      tl.from(el, {
        opacity: 0, x: 15, duration: 0.4, ease: 'power2.out'
      }, 5.6 + i * 0.2);
    });

    // Down arrow to ops
    tl.from($('#arrow-ops'), {
      opacity: 0, scaleY: 0, transformOrigin: 'top center', duration: 0.35, ease: 'power2.out'
    }, 6.2);

    // "LLM decides" label
    tl.from($('#decide-label'), {
      opacity: 0, duration: 0.3, ease: 'power1.out'
    }, 6.5);

    // Operation badges stagger in with bounce
    var ops = $$('.op');
    ops.forEach(function(el, i) {
      tl.from(el, {
        opacity: 0, y: 25, scale: 0.85, duration: 0.5, ease: 'back.out(1.6)'
      }, 6.8 + i * 0.25);
    });

    // Highlight ADD badge — it "lights up" for this example
    tl.to($('#op-add'), {
      boxShadow: '0 0 28px rgba(63,185,80,0.7), inset 0 0 12px rgba(63,185,80,0.15)',
      scale: 1.08,
      duration: 0.4,
      ease: 'power2.out'
    }, 8.0);

    // Dim the other ops slightly to emphasize ADD
    ['#op-update', '#op-delete', '#op-noop'].forEach(function(sel) {
      tl.to($(sel), { opacity: 0.4, duration: 0.4, ease: 'power1.out' }, 8.0);
    });

    /* ============================================================
       BOTTOM TAKEAWAY  (9.0s)
       ============================================================ */
    tl.from($('#takeaway'), {
      opacity: 0, y: 20, duration: 0.6, ease: 'power2.out'
    }, 9.0);

    // Subtle color shift on takeaway
    tl.to($('#takeaway'), {
      color: '#2EC4B6', borderColor: 'rgba(46,196,182,0.4)',
      duration: 0.8, ease: 'power1.inOut'
    }, 9.5);

    /* ============================================================
       HOLD  (fills remaining duration to 12s)
       ============================================================ */
    tl.to({}, { duration: 1.5 });

    window.__timelines["mem0-pipeline"] = tl;
  </script>
</div>
</body>
</html>
