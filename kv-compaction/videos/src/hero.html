<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div
  data-composition-id="kv-hero"
  data-width="1920"
  data-height="540"
  data-start="0"
  data-duration="10"
>
  <div class="scene">
    <!-- Left: Full cache -->
    <div class="cache-panel full-panel">
      <div class="cache-label">Full KV Cache</div>
      <div class="cache-grid" id="full-grid"></div>
      <div class="cache-stat">50,000 tokens</div>
    </div>

    <!-- Center: Compaction -->
    <div class="center-zone">
      <div class="compact-arrow">&#8594;</div>
      <div class="compact-label">Attention<br>Matching</div>
      <div class="compact-arrow">&#8594;</div>
    </div>

    <!-- Right: Compact cache -->
    <div class="cache-panel compact-panel">
      <div class="cache-label" style="color:#2EC4B6;">Compacted Cache</div>
      <div class="cache-grid-small" id="compact-grid"></div>
      <div class="cache-stat" style="color:#2EC4B6;">1,000 tokens</div>
    </div>

    <!-- Bottom: comparison -->
    <div class="compare-zone">
      <div class="compare-item">
        <div class="compare-val" style="color:#E71D36;">100%</div>
        <div class="compare-desc">original size</div>
      </div>
      <div class="compare-vs">vs</div>
      <div class="compare-item">
        <div class="compare-val" style="color:#2EC4B6;">2%</div>
        <div class="compare-desc">compacted size</div>
      </div>
      <div class="compare-eq">=</div>
      <div class="compare-item">
        <div class="compare-val" style="color:#3fb950;">~same quality</div>
        <div class="compare-desc">on downstream tasks</div>
      </div>
    </div>
  </div>

  <style>
    [data-composition-id="kv-hero"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { position: relative; width: 1920px; height: 540px; }

    .cache-panel { position: absolute; top: 40px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .full-panel { left: 80px; width: 580px; }
    .compact-panel { left: 1200px; width: 400px; }
    .cache-label { font-size: 32px; font-weight: 700; color: #E71D36; }
    .cache-stat { font-size: 26px; font-weight: 700; color: #E71D36; }

    .cache-grid { display: flex; flex-wrap: wrap; gap: 4px; width: 520px; }
    .cache-cell { width: 22px; height: 22px; border-radius: 3px; background: #E71D36; opacity: 0.7; }

    .cache-grid-small { display: flex; flex-wrap: wrap; gap: 5px; width: 200px; }
    .compact-cell { width: 24px; height: 24px; border-radius: 3px; background: #2EC4B6; opacity: 0.85; }

    .center-zone {
      position: absolute; left: 700px; top: 100px; width: 460px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .compact-arrow { font-size: 56px; color: #415A77; }
    .compact-label {
      font-size: 36px; font-weight: 700; color: #FF9F1C; text-align: center; line-height: 1.3;
    }

    .compare-zone {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 24px;
    }
    .compare-item { text-align: center; }
    .compare-val { font-size: 36px; font-weight: 700; }
    .compare-desc { font-size: 20px; color: #778DA9; }
    .compare-vs { font-size: 28px; color: #415A77; font-weight: 700; }
    .compare-eq { font-size: 36px; color: #415A77; font-weight: 700; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    // Build full grid (200 cells = visual representation of big cache)
    var fullGrid = root.querySelector('#full-grid');
    for (var i = 0; i < 200; i++) {
      var cell = document.createElement('div');
      cell.className = 'cache-cell';
      fullGrid.appendChild(cell);
    }

    // Build compact grid (20 cells)
    var compactGrid = root.querySelector('#compact-grid');
    for (var i = 0; i < 20; i++) {
      var cell = document.createElement('div');
      cell.className = 'compact-cell';
      cell.id = 'cc-' + i;
      compactGrid.appendChild(cell);
    }

    // Full cache appears
    tl.from(root.querySelector('.full-panel .cache-label'), { opacity: 0, duration: 0.4 }, 0);
    tl.from(root.querySelector('#full-grid'), { opacity: 0, scale: 0.95, duration: 0.8, ease: 'power2.out' }, 0.2);
    tl.from(root.querySelector('.full-panel .cache-stat'), { opacity: 0, duration: 0.4 }, 0.8);

    // Center: Attention Matching
    tl.from(root.querySelector('.compact-label'), { opacity: 0, scale: 0.8, duration: 0.5, ease: 'power2.out' }, 1.5);
    root.querySelectorAll('.compact-arrow').forEach(function(el, i) {
      tl.from(el, { opacity: 0, x: i === 0 ? -15 : 15, duration: 0.4 }, 1.8 + i * 0.3);
    });

    // Compact cache appears
    tl.from(root.querySelector('.compact-panel .cache-label'), { opacity: 0, duration: 0.4 }, 2.8);
    // Compact cells appear row by row
    for (var i = 0; i < 20; i++) {
      tl.from(root.querySelector('#cc-' + i), { opacity: 0, scale: 0.5, duration: 0.2, ease: 'power2.out' }, 3.0 + Math.floor(i / 5) * 0.15 + (i % 5) * 0.04);
    }
    tl.from(root.querySelector('.compact-panel .cache-stat'), { opacity: 0, duration: 0.4 }, 3.8);

    // Comparison bar at bottom
    tl.from(root.querySelector('.compare-zone'), { opacity: 0, y: 20, duration: 0.6, ease: 'power2.out' }, 4.5);

    // Hold
    tl.to({}, { duration: 3 });

    window.__timelines["kv-hero"] = tl;
  </script>
</div>
</body>
</html>
