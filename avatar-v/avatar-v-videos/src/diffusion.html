<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div
  data-composition-id="diffusion-explainer"
  data-width="1920"
  data-height="540"
  data-start="0"
  data-duration="14"
>
  <div class="scene">
    <div class="bg-gradient"></div>

    <!-- Top bar: title left, step counter right -->
    <div class="top-bar">
      <div class="title" id="title">How <span class="teal">Diffusion</span> Models Work</div>
      <div class="step-counter" id="step-counter">Step <span id="step-num">0</span> / 24</div>
    </div>

    <!-- Subtitle -->
    <div class="subtitle" id="subtitle">Start from pure noise → remove noise step by step → clean image</div>

    <!-- Canvas row: noise label | canvas | clean label -->
    <div class="canvas-row">
      <div class="endpoint-label" id="lbl-noise">Pure Noise</div>
      <canvas id="pixel-canvas"></canvas>
      <div class="endpoint-label lbl-clean" id="lbl-clean">Clean Output</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-labels">
        <span style="color:#778DA9;">noise</span>
        <span style="color:#2EC4B6;">clean</span>
      </div>
    </div>

    <!-- Bottom callout -->
    <div class="bottom-callout" id="bottom-callout">
      Each step, the model predicts "what noise is here?" and subtracts it
    </div>
  </div>

  <style>
    [data-composition-id="diffusion-explainer"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { position: relative; width: 1920px; height: 540px; }

    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 100% at 50% 50%, rgba(46,196,182,0.04) 0%, transparent 70%),
        linear-gradient(180deg, rgba(1,22,39,1) 0%, rgba(2,30,50,1) 100%);
    }

    .top-bar {
      position: absolute; top: 16px; left: 80px; right: 80px;
      display: flex; justify-content: space-between; align-items: baseline;
      z-index: 10;
    }
    .title {
      font-size: 34px; font-weight: 700; white-space: nowrap; opacity: 0;
    }
    .teal { color: #2EC4B6; }

    .step-counter {
      font-size: 22px; font-weight: 700; color: #bc8cff; opacity: 0;
      white-space: nowrap;
    }
    #step-num { color: #FDFFFC; font-size: 26px; }

    .subtitle {
      position: absolute; top: 60px; left: 80px;
      font-size: 16px; font-weight: 400; color: #778DA9; opacity: 0;
      white-space: nowrap; z-index: 10;
    }

    .canvas-row {
      position: absolute; top: 95px; left: 80px; right: 80px;
      display: flex; align-items: center; gap: 28px;
      z-index: 5;
    }
    .endpoint-label {
      font-size: 16px; font-weight: 700; color: #778DA9;
      writing-mode: vertical-rl; transform: rotate(180deg);
      letter-spacing: 1px; opacity: 0;
    }
    .lbl-clean { color: #2EC4B6; }

    #pixel-canvas {
      flex: 1;
      height: 340px;
      image-rendering: pixelated;
      border-radius: 8px;
      border: 1px solid #415A77;
      opacity: 0;
    }

    .progress-wrap {
      position: absolute; bottom: 52px; left: 140px; right: 140px;
      z-index: 10; opacity: 0;
    }
    .progress-track {
      width: 100%; height: 6px; background: #1B263B;
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #778DA9, #2EC4B6);
      border-radius: 3px;
    }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: 13px; font-weight: 700; margin-top: 4px;
    }

    .bottom-callout {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-size: 17px; font-weight: 400; color: #FF9F1C; opacity: 0;
      white-space: nowrap; z-index: 10;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    /* ── Seeded random ── */
    function sr(i) {
      return Math.abs((Math.sin(i * 12.9898 + 78.233) * 43758.5453) % 1);
    }

    /* ── Canvas setup ── */
    var canvas = root.querySelector('#pixel-canvas');
    var ctx = canvas.getContext('2d');
    var COLS = 64;
    var ROWS = 34;
    var TOTAL = COLS * ROWS;

    // Size canvas to match CSS dimensions
    canvas.width = COLS;
    canvas.height = ROWS;

    /* ── Color utilities ── */
    function hexRgb(h) {
      return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    }
    function lerp3(a, b, t) {
      return [
        Math.round(a[0]+(b[0]-a[0])*t),
        Math.round(a[1]+(b[1]-a[1])*t),
        Math.round(a[2]+(b[2]-a[2])*t)
      ];
    }

    var C_TEAL = hexRgb('#2EC4B6');
    var C_PURPLE = hexRgb('#bc8cff');
    var C_ORANGE = hexRgb('#FF9F1C');
    var C_RED = hexRgb('#E71D36');
    var C_GREEN = hexRgb('#3fb950');

    /* ── Build clean image: a heart shape ── */
    var cleanPixels = [];
    var centerX = (COLS - 1) / 2;
    var centerY = (ROWS - 1) / 2;

    // Heart equation: (x² + y² - 1)³ - x²y³ < 0
    // Map grid to [-1.3, 1.3] range, shifted up slightly so heart is centered
    for (var i = 0; i < TOTAL; i++) {
      var col = i % COLS;
      var row = Math.floor(i / COLS);

      // Normalize to [-1.3, 1.3] with y flipped (screen y goes down)
      var hx = (col - centerX) / (COLS * 0.36);
      var hy = -(row - centerY) / (ROWS * 0.40) + 0.15; // shift up a bit

      // Heart implicit equation
      var val = Math.pow(hx * hx + hy * hy - 1, 3) - hx * hx * hy * hy * hy;
      var inside = val < 0;

      // Distance from heart boundary for glow/gradient
      var distFromEdge = -val; // positive inside, negative outside

      var rgb;
      if (inside) {
        // Inside: warm gradient from center to edge
        var depth = Math.min(1, distFromEdge * 3);
        // Core is bright red/orange, edges are deeper red
        rgb = lerp3(C_RED, C_ORANGE, depth * 0.6 + sr(i * 7) * 0.15);
        // Brightness variation for texture
        var bright = 0.9 + sr(i * 13 + 5) * 0.2;
        rgb = [
          Math.min(255, Math.round(rgb[0] * bright)),
          Math.min(255, Math.round(rgb[1] * bright)),
          Math.min(255, Math.round(rgb[2] * bright))
        ];
      } else {
        // Outside: dark background with subtle teal tint near the heart
        var outerDist = Math.min(1, Math.abs(val) * 2);
        if (outerDist < 0.3) {
          // Near the heart edge: subtle glow
          var glow = 1 - outerDist / 0.3;
          rgb = lerp3([8, 18, 32], C_TEAL, glow * 0.15);
        } else {
          // Far from heart: dark bg with very subtle variation
          rgb = [
            8 + Math.round(sr(i * 19 + 1) * 12),
            18 + Math.round(sr(i * 23 + 3) * 10),
            32 + Math.round(sr(i * 29 + 7) * 14)
          ];
        }
      }

      cleanPixels.push(rgb);
    }

    /* ── Build noise image: random dark static ── */
    var noisePixels = [];
    for (var i = 0; i < TOTAL; i++) {
      var v1 = sr(i * 17 + 3);
      var v2 = sr(i * 23 + 11);
      var v3 = sr(i * 31 + 7);
      // Dark muted random colors
      noisePixels.push([
        Math.round(20 + v1 * 60),
        Math.round(25 + v2 * 55),
        Math.round(35 + v3 * 65)
      ]);
    }

    /* ── Render function: blend between noise and clean based on global progress ── */
    /* globalProgress 0 = pure noise, 1 = fully clean */
    var globalProgress = { v: 0 };

    function renderCanvas() {
      var imgData = ctx.createImageData(COLS, ROWS);
      var d = imgData.data;
      var p = globalProgress.v;
      for (var i = 0; i < TOTAL; i++) {
        var n = noisePixels[i];
        var c = cleanPixels[i];
        // Per-cell jitter: some cells resolve slightly earlier/later for organic feel
        var jitter = sr(i * 41 + 19) * 0.12 - 0.06; // ±6% variation
        var cellP = Math.max(0, Math.min(1, p + jitter));
        var idx = i * 4;
        d[idx]   = Math.round(n[0] + (c[0] - n[0]) * cellP);
        d[idx+1] = Math.round(n[1] + (c[1] - n[1]) * cellP);
        d[idx+2] = Math.round(n[2] + (c[2] - n[2]) * cellP);
        d[idx+3] = 255;
      }
      ctx.putImageData(imgData, 0, 0);
    }

    // Initialize as full noise
    renderCanvas();

    /* ── Elements ── */
    var stepNumEl = root.querySelector('#step-num');
    var progressFill = root.querySelector('#progress-fill');

    /* ============================================================
       ANIMATION TIMELINE
       ============================================================ */

    // Phase 1 (0-2s): Title, labels, canvas appears showing noise
    tl.to(root.querySelector('.title'), {
      opacity: 1, duration: 0.6, ease: 'power2.out'
    }, 0.2);
    tl.from(root.querySelector('.title'), {
      y: -15, duration: 0.6, ease: 'power2.out'
    }, 0.2);

    tl.to(root.querySelector('.subtitle'), {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 0.6);

    tl.to(root.querySelector('#pixel-canvas'), {
      opacity: 1, duration: 0.8, ease: 'power2.out'
    }, 0.8);
    tl.from(root.querySelector('#pixel-canvas'), {
      scale: 0.95, duration: 0.8, ease: 'power2.out'
    }, 0.8);

    tl.to(root.querySelector('#lbl-noise'), {
      opacity: 1, duration: 0.4, ease: 'power2.out'
    }, 1.0);
    tl.to(root.querySelector('#lbl-clean'), {
      opacity: 0.3, duration: 0.4, ease: 'power2.out'
    }, 1.0);

    tl.to(root.querySelector('#progress-wrap'), {
      opacity: 1, duration: 0.4, ease: 'power2.out'
    }, 1.2);

    // Show step counter
    tl.to(root.querySelector('#step-counter'), {
      opacity: 1, duration: 0.4, ease: 'power2.out'
    }, 1.4);

    // Phase 2 (2-10.5s): 24 denoising steps — whole image jumps cleaner at each step
    var STEPS = 24;
    var denoiseDur = 8.0;
    var stepDur = denoiseDur / STEPS;
    var denoiseStart = 2.0;

    // Each step: snap to a new noise level, then hold until next step
    for (var step = 0; step < STEPS; step++) {
      (function(s) {
        var targetProgress = (s + 1) / STEPS;
        var stepTime = denoiseStart + s * stepDur;
        // Quick snap (not smooth) — visible discrete jump
        tl.to(globalProgress, {
          v: targetProgress, duration: stepDur * 0.25, ease: 'power2.out',
          onUpdate: renderCanvas
        }, stepTime);
        // Update step counter
        tl.to({}, {
          duration: 0.01,
          onComplete: function() { stepNumEl.textContent = s + 1; }
        }, stepTime);
        // Update progress bar
        tl.to(progressFill, {
          width: (targetProgress * 100) + '%', duration: stepDur * 0.25, ease: 'power2.out'
        }, stepTime);
      })(step);
    }

    // Clean label brightens as we progress
    tl.to(root.querySelector('#lbl-clean'), {
      opacity: 1, color: '#2EC4B6', duration: denoiseDur * 0.7, ease: 'power2.in'
    }, denoiseStart + denoiseDur * 0.3);

    // Noise label dims
    tl.to(root.querySelector('#lbl-noise'), {
      opacity: 0.3, duration: denoiseDur * 0.5, ease: 'power2.in'
    }, denoiseStart + denoiseDur * 0.5);

    // Canvas border glows teal on completion
    tl.to(root.querySelector('#pixel-canvas'), {
      borderColor: '#2EC4B6',
      boxShadow: '0 0 30px rgba(46,196,182,0.25)',
      duration: 0.6, ease: 'power2.out'
    }, 10.2);

    // Phase 4 (11-14s): Bottom callout + hold
    tl.to(root.querySelector('#bottom-callout'), {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 11.2);
    tl.from(root.querySelector('#bottom-callout'), {
      y: 10, duration: 0.5, ease: 'power2.out'
    }, 11.2);

    // Subtitle fades to make room
    tl.to(root.querySelector('.subtitle'), {
      opacity: 0.3, duration: 0.4
    }, 11.0);

    // Hold
    tl.to({}, { duration: 0.5 }, 13.5);

    window.__timelines["diffusion-explainer"] = tl;
  </script>
</div>
</body>
</html>
