<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div
  data-composition-id="sparse-attention"
  data-width="1920"
  data-height="540"
  data-start="0"
  data-duration="12"
>
  <div class="scene">
    <div class="title">Standard Attention vs <span class="teal">Sparse Reference</span> Attention</div>

    <!-- Left: Standard (Quadratic) -->
    <div class="panel panel-left">
      <div class="panel-label" style="color:#E71D36;">Standard (Quadratic)</div>
      <div class="grid-wrap">
        <div class="axis-label y-axis">Query tokens</div>
        <div class="grid" id="grid-standard"></div>
        <div class="axis-label x-axis">Key tokens</div>
      </div>
      <div class="cost-label" style="color:#E71D36;">O(n&sup2;) &mdash; every token attends to every token</div>
    </div>

    <!-- Right: Sparse Reference (Linear) -->
    <div class="panel panel-right">
      <div class="panel-label" style="color:#2EC4B6;">Sparse Reference (Linear)</div>
      <div class="grid-wrap">
        <div class="axis-label y-axis">Query tokens</div>
        <div class="grid" id="grid-sparse"></div>
        <div class="axis-label x-axis">Reference tokens</div>
      </div>
      <div class="cost-label" style="color:#2EC4B6;">O(n) &mdash; only attends to reference</div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:#E71D36;"></div><span>Full attention</span></div>
      <div class="legend-item"><div class="legend-box" style="background:#2EC4B6;"></div><span>Sparse (reference only)</span></div>
      <div class="legend-item"><div class="legend-box" style="background:#415A77;"></div><span>No computation</span></div>
    </div>
  </div>

  <style>
    [data-composition-id="sparse-attention"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { position: relative; width: 1920px; height: 540px; }
    .title {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 42px; font-weight: 700; white-space: nowrap;
    }
    .teal { color: #2EC4B6; }

    .panel { position: absolute; top: 72px; display: flex; flex-direction: column; align-items: center; }
    .panel-left { left: 80px; width: 800px; }
    .panel-right { left: 1000px; width: 800px; }
    .panel-label { font-size: 30px; font-weight: 700; margin-bottom: 10px; }

    .grid-wrap { position: relative; display: flex; align-items: center; gap: 12px; }
    .y-axis {
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-size: 24px; color: #778DA9;
    }
    .x-axis {
      position: absolute; bottom: -34px; left: 50%; transform: translateX(-50%);
      font-size: 24px; color: #778DA9; white-space: nowrap;
    }
    .axis-label { font-weight: 400; }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 280px; height: 280px; gap: 3px;
    }
    .cell {
      border-radius: 3px;
    }
    .cell-full { background: #E71D36; }
    .cell-sparse { background: #2EC4B6; }
    .cell-empty { background: #415A77; opacity: 0.25; }

    .cost-label {
      font-size: 22px; font-weight: 700; margin-top: 40px; white-space: nowrap;
    }

    .legend {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 40px; font-size: 20px; color: #778DA9;
    }
    .legend-item { display: flex; align-items: center; gap: 10px; }
    .legend-box { width: 20px; height: 20px; border-radius: 3px; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    // Build grids with individual cells
    var gridStd = root.querySelector('#grid-standard');
    var gridSparse = root.querySelector('#grid-sparse');
    var stdCells = [];
    var spCells = [];

    for (var i = 0; i < 64; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell cell-full';
      gridStd.appendChild(cell);
      stdCells.push(cell);
    }

    for (var r = 0; r < 8; r++) {
      for (var c = 0; c < 8; c++) {
        var cell = document.createElement('div');
        cell.className = c < 3 ? 'cell cell-sparse' : 'cell cell-empty';
        gridSparse.appendChild(cell);
        spCells.push(cell);
      }
    }

    // Animations
    tl.from(root.querySelector('.title'), { y: -20, opacity: 0, duration: 0.6, ease: 'power2.out' }, 0);

    // Left panel
    tl.from(root.querySelector('.panel-left'), { opacity: 0, x: -30, duration: 0.8 }, 0.3);
    tl.from(root.querySelector('.panel-left .panel-label'), { opacity: 0, duration: 0.5 }, 0.5);

    // Standard grid: per-cell opacity fade, diagonal wave
    for (var i = 0; i < 64; i++) {
      var row = Math.floor(i / 8);
      var col = i % 8;
      tl.from(stdCells[i], { opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.8 + row * 0.12 + col * 0.12);
    }

    root.querySelectorAll('.panel-left .axis-label').forEach(function(el) {
      tl.from(el, { opacity: 0, duration: 0.5 }, 1.2);
    });
    tl.from(root.querySelector('.panel-left .cost-label'), { opacity: 0, y: 10, duration: 0.5 }, 2.8);

    // Right panel
    tl.from(root.querySelector('.panel-right'), { opacity: 0, x: 30, duration: 0.8 }, 3.5);
    tl.from(root.querySelector('.panel-right .panel-label'), { opacity: 0, duration: 0.5 }, 3.7);

    // Sparse grid: same diagonal wave
    for (var i = 0; i < 64; i++) {
      var row = Math.floor(i / 8);
      var col = i % 8;
      tl.from(spCells[i], { opacity: 0, duration: 0.35, ease: 'power2.out' }, 4.0 + row * 0.12 + col * 0.12);
    }

    root.querySelectorAll('.panel-right .axis-label').forEach(function(el) {
      tl.from(el, { opacity: 0, duration: 0.5 }, 4.4);
    });
    tl.from(root.querySelector('.panel-right .cost-label'), { opacity: 0, y: 10, duration: 0.5 }, 6.0);

    // Legend
    tl.from(root.querySelector('.legend'), { opacity: 0, y: 10, duration: 0.5 }, 6.5);

    // Hold
    tl.to({}, { duration: 3 });

    window.__timelines["sparse-attention"] = tl;
  </script>
</div>
</body>
</html>
