<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div
  data-composition-id="chunk-generation"
  data-width="1920"
  data-height="540"
  data-start="0"
  data-duration="14"
>
  <div class="scene">
    <!-- Sliding track that pans to reveal the timeline -->
    <div class="track">

      <!-- Reference video block -->
      <div class="ref-block">
        <div class="ref-label">Reference Video</div>
        <div class="ref-frame">
          <div class="ref-inner">
            <div class="ref-icon-row">
              <svg class="ref-icon" viewBox="0 0 40 40" width="40" height="40">
                <circle cx="20" cy="14" r="9" fill="#FF9F1C" opacity="0.7"/>
                <ellipse cx="20" cy="34" rx="14" ry="10" fill="#FF9F1C" opacity="0.5"/>
              </svg>
              <span class="ref-text">10s clip</span>
            </div>
          </div>
        </div>
        <!-- Anchor icon -->
        <div class="anchor-icon">
          <svg viewBox="0 0 28 28" width="28" height="28">
            <circle cx="14" cy="6" r="4" fill="none" stroke="#3fb950" stroke-width="2"/>
            <line x1="14" y1="10" x2="14" y2="26" stroke="#3fb950" stroke-width="2"/>
            <line x1="6" y1="20" x2="14" y2="26" stroke="#3fb950" stroke-width="2"/>
            <line x1="22" y1="20" x2="14" y2="26" stroke="#3fb950" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <!-- Anchor line (horizontal, extends across all chunks) -->
      <div class="anchor-line"></div>

      <!-- Chunk 1 -->
      <div class="chunk chunk-1">
        <div class="chunk-body">
          <div class="chunk-fill chunk-fill-1"></div>
          <div class="chunk-border"></div>
          <div class="chunk-label-top">Chunk 1</div>
          <div class="chunk-duration">6.4s</div>
          <div class="frame-indicators">
            <div class="frame-bar fb1"></div>
            <div class="frame-bar fb2"></div>
            <div class="frame-bar fb3"></div>
            <div class="frame-bar fb4"></div>
            <div class="frame-bar fb5"></div>
            <div class="frame-bar fb6"></div>
            <div class="frame-bar fb7"></div>
            <div class="frame-bar fb8"></div>
          </div>
        </div>
      </div>

      <!-- Overlap zone 1-2 -->
      <div class="overlap overlap-12">
        <div class="overlap-glow"></div>
      </div>

      <!-- Chunk 2 -->
      <div class="chunk chunk-2">
        <div class="chunk-body">
          <div class="chunk-fill chunk-fill-2"></div>
          <div class="chunk-border"></div>
          <div class="chunk-label-top">Chunk 2</div>
          <div class="chunk-duration">6.4s</div>
          <div class="frame-indicators">
            <div class="frame-bar fb1"></div>
            <div class="frame-bar fb2"></div>
            <div class="frame-bar fb3"></div>
            <div class="frame-bar fb4"></div>
            <div class="frame-bar fb5"></div>
            <div class="frame-bar fb6"></div>
            <div class="frame-bar fb7"></div>
            <div class="frame-bar fb8"></div>
          </div>
        </div>
        <!-- Dotted line from chunk 2 back to ref anchor -->
        <div class="dotted-anchor-line dal-2"></div>
      </div>

      <!-- Overlap zone 2-3 -->
      <div class="overlap overlap-23">
        <div class="overlap-glow"></div>
      </div>

      <!-- Chunk 3 -->
      <div class="chunk chunk-3">
        <div class="chunk-body">
          <div class="chunk-fill chunk-fill-3"></div>
          <div class="chunk-border"></div>
          <div class="chunk-label-top">Chunk 3</div>
          <div class="chunk-duration">6.4s</div>
          <div class="frame-indicators">
            <div class="frame-bar fb1"></div>
            <div class="frame-bar fb2"></div>
            <div class="frame-bar fb3"></div>
            <div class="frame-bar fb4"></div>
            <div class="frame-bar fb5"></div>
            <div class="frame-bar fb6"></div>
            <div class="frame-bar fb7"></div>
            <div class="frame-bar fb8"></div>
          </div>
        </div>
        <div class="dotted-anchor-line dal-3"></div>
      </div>

      <!-- Overlap zone 3-4 -->
      <div class="overlap overlap-34">
        <div class="overlap-glow"></div>
      </div>

      <!-- Chunk 4 (partial, suggesting continuation) -->
      <div class="chunk chunk-4">
        <div class="chunk-body">
          <div class="chunk-fill chunk-fill-4"></div>
          <div class="chunk-border"></div>
          <div class="chunk-label-top">Chunk 4</div>
          <div class="chunk-duration">6.4s</div>
          <div class="frame-indicators">
            <div class="frame-bar fb1"></div>
            <div class="frame-bar fb2"></div>
            <div class="frame-bar fb3"></div>
            <div class="frame-bar fb4"></div>
          </div>
        </div>
        <div class="dotted-anchor-line dal-4"></div>
      </div>

      <!-- Infinity arrow -->
      <div class="infinity-arrow">
        <svg viewBox="0 0 80 40" width="80" height="40">
          <line x1="0" y1="20" x2="54" y2="20" stroke="#778DA9" stroke-width="3"/>
          <polygon points="50,10 70,20 50,30" fill="#778DA9"/>
        </svg>
        <div class="infinity-symbol">&infin;</div>
      </div>

    </div><!-- end .track -->

    <!-- Phase 2 label (fixed position, doesn't scroll) -->
    <div class="phase-label phase-label-1">First chunk: uses reference directly.</div>

    <!-- Phase 3 label -->
    <div class="phase-label phase-label-2">Bridge frames maintain continuity.</div>

    <!-- Phase 5 bottom callout -->
    <div class="bottom-callout">
      <span class="callout-text">Global appearance anchor keeps identity consistent across all chunks</span>
    </div>

    <!-- Title -->
    <div class="title">Chunk-Based Generation</div>
  </div>

  <style>
    [data-composition-id="chunk-generation"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { position: relative; width: 1920px; height: 540px; overflow: hidden; }

    /* Title */
    .title {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      font-size: 40px; font-weight: 700; white-space: nowrap; opacity: 0;
      z-index: 10;
    }

    /* Sliding track */
    .track {
      position: absolute; top: 0; left: 0; width: 3200px; height: 540px;
    }

    /* Reference block */
    .ref-block {
      position: absolute; left: 60px; top: 100px; width: 160px; opacity: 0;
    }
    .ref-label {
      font-size: 18px; font-weight: 700; color: #FF9F1C; margin-bottom: 8px;
      text-align: center;
    }
    .ref-frame {
      width: 160px; height: 180px; border: 3px solid #FF9F1C; border-radius: 12px;
      background: rgba(255,159,28,0.08); display: flex; align-items: center;
      justify-content: center; position: relative;
    }
    .ref-inner { text-align: center; }
    .ref-icon { display: block; margin: 0 auto 8px; }
    .ref-text { font-size: 16px; color: #FF9F1C; font-weight: 400; }
    .anchor-icon {
      position: absolute; bottom: -44px; left: 50%; transform: translateX(-50%);
      opacity: 0;
    }

    /* Anchor line (green, runs below chunks) */
    .anchor-line {
      position: absolute; top: 360px; left: 140px; width: 0; height: 2px;
      background: #3fb950; opacity: 0.4;
    }

    /* Chunks */
    .chunk {
      position: absolute; top: 110px; opacity: 0;
    }
    .chunk-1 { left: 270px; }
    .chunk-2 { left: 610px; }
    .chunk-3 { left: 950px; }
    .chunk-4 { left: 1290px; }

    .chunk-body {
      position: relative; width: 390px; height: 200px; border-radius: 16px;
      overflow: hidden;
    }
    .chunk-4 .chunk-body { width: 300px; }

    .chunk-fill {
      position: absolute; inset: 0; border-radius: 16px; opacity: 0.12;
    }
    .chunk-fill-1 { background: linear-gradient(135deg, #2EC4B6 0%, #1a8a80 100%); }
    .chunk-fill-2 { background: linear-gradient(135deg, #3dd4c6 0%, #2EC4B6 100%); }
    .chunk-fill-3 { background: linear-gradient(135deg, #2EC4B6 0%, #25a89c 100%); }
    .chunk-fill-4 { background: linear-gradient(135deg, #3dd4c6 0%, #1a8a80 100%); }

    .chunk-border {
      position: absolute; inset: 0; border-radius: 16px;
      border: 2.5px solid #2EC4B6;
    }
    .chunk-label-top {
      position: absolute; top: 14px; left: 20px;
      font-size: 22px; font-weight: 700; color: #2EC4B6;
    }
    .chunk-duration {
      position: absolute; top: 16px; right: 20px;
      font-size: 17px; font-weight: 400; color: #778DA9;
    }

    /* Frame indicators inside chunks */
    .frame-indicators {
      position: absolute; bottom: 24px; left: 20px; right: 20px;
      display: flex; gap: 6px; align-items: flex-end;
    }
    .frame-bar {
      flex: 1; border-radius: 3px; background: rgba(46,196,182,0.3);
    }
    .fb1 { height: 40px; }
    .fb2 { height: 55px; }
    .fb3 { height: 35px; }
    .fb4 { height: 60px; }
    .fb5 { height: 45px; }
    .fb6 { height: 50px; }
    .fb7 { height: 38px; }
    .fb8 { height: 52px; }

    /* Overlap zones */
    .overlap {
      position: absolute; top: 110px; width: 52px; height: 200px;
      border-radius: 8px; opacity: 0; z-index: 5;
    }
    .overlap-12 { left: 608px; }
    .overlap-23 { left: 948px; }
    .overlap-34 { left: 1288px; }

    .overlap-glow {
      position: absolute; inset: -4px; border-radius: 12px;
      background: radial-gradient(ellipse at center, rgba(188,140,255,0.45) 0%, rgba(188,140,255,0) 70%);
      border: 2px solid rgba(188,140,255,0.6);
    }

    /* Dotted anchor lines from chunks back to reference */
    .dotted-anchor-line {
      position: absolute; bottom: -52px; left: 50%; width: 1px; height: 0;
      border-left: 2px dashed rgba(63,185,80,0.5);
      opacity: 0;
    }
    .dal-2 { left: 195px; }
    .dal-3 { left: 195px; }
    .dal-4 { left: 150px; }

    /* Infinity arrow */
    .infinity-arrow {
      position: absolute; left: 1560px; top: 170px;
      display: flex; align-items: center; gap: 8px; opacity: 0;
    }
    .infinity-symbol {
      font-size: 48px; font-weight: 700; color: #778DA9;
    }

    /* Phase labels (fixed, don't scroll) */
    .phase-label {
      position: absolute; font-size: 22px; font-weight: 400; color: #778DA9;
      opacity: 0; z-index: 10; white-space: nowrap;
    }
    .phase-label-1 { bottom: 70px; left: 120px; }
    .phase-label-2 { bottom: 70px; left: 120px; }

    /* Bottom callout */
    .bottom-callout {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      opacity: 0; z-index: 10; text-align: center; white-space: nowrap;
    }
    .callout-text {
      font-size: 24px; font-weight: 700; color: #3fb950;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    var track = root.querySelector('.track');
    var title = root.querySelector('.title');
    var refBlock = root.querySelector('.ref-block');
    var anchorIcon = root.querySelector('.anchor-icon');
    var anchorLine = root.querySelector('.anchor-line');
    var chunk1 = root.querySelector('.chunk-1');
    var chunk2 = root.querySelector('.chunk-2');
    var chunk3 = root.querySelector('.chunk-3');
    var chunk4 = root.querySelector('.chunk-4');
    var overlap12 = root.querySelector('.overlap-12');
    var overlap23 = root.querySelector('.overlap-23');
    var overlap34 = root.querySelector('.overlap-34');
    var dal2 = root.querySelector('.dal-2');
    var dal3 = root.querySelector('.dal-3');
    var dal4 = root.querySelector('.dal-4');
    var infArrow = root.querySelector('.infinity-arrow');
    var label1 = root.querySelector('.phase-label-1');
    var label2 = root.querySelector('.phase-label-2');
    var callout = root.querySelector('.bottom-callout');

    // ── Phase 1 (0-3s): Title + Reference ──────────────────────────

    // Title fades in with gentle rise
    tl.to(title, {
      opacity: 1, duration: 0.8, ease: 'power2.out'
    }, 0.2);

    // Reference block appears
    tl.to(refBlock, {
      opacity: 1, duration: 0.7, ease: 'power3.out'
    }, 0.8);
    tl.from(refBlock, {
      x: -30, duration: 0.7, ease: 'power3.out'
    }, 0.8);

    // Anchor icon drops in
    tl.to(anchorIcon, {
      opacity: 1, duration: 0.5, ease: 'back.out(1.7)'
    }, 1.6);
    tl.from(anchorIcon, {
      y: -12, duration: 0.5, ease: 'back.out(1.7)'
    }, 1.6);

    // Anchor line starts growing
    tl.to(anchorLine, {
      width: 240, opacity: 0.4, duration: 0.8, ease: 'power1.inOut'
    }, 2.0);


    // ── Phase 2 (3-7s): Chunk 1 materializes ───────────────────────

    // Chunk 1 appears with scale + fade
    tl.to(chunk1, {
      opacity: 1, duration: 0.6, ease: 'power2.out'
    }, 3.0);
    tl.from(chunk1, {
      scale: 0.92, transformOrigin: 'left center', duration: 0.6, ease: 'power2.out'
    }, 3.0);

    // Frame bars stagger in
    root.querySelectorAll('.chunk-1 .frame-bar').forEach(function(bar, i) {
      tl.from(bar, {
        scaleY: 0, transformOrigin: 'bottom', duration: 0.35,
        ease: 'back.out(2)'
      }, 3.4 + i * 0.08);
    });

    // Extend anchor line to cover chunk 1
    tl.to(anchorLine, {
      width: 540, duration: 0.6, ease: 'power1.inOut'
    }, 3.6);

    // Phase 2 label
    tl.to(label1, {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 4.2);
    tl.from(label1, {
      y: 10, duration: 0.5, ease: 'power2.out'
    }, 4.2);

    // Title fades up as we leave phase 1
    tl.to(title, {
      opacity: 0, y: -15, duration: 0.6, ease: 'power2.in'
    }, 5.0);

    // Breathe: subtle pulse on chunk 1 fill
    tl.to(root.querySelector('.chunk-fill-1'), {
      opacity: 0.18, duration: 1.0, ease: 'sine.inOut', yoyo: true, repeat: 1
    }, 5.0);


    // ── Phase 3 (7-10s): Chunk 2 slides in ─────────────────────────

    // Fade out label 1
    tl.to(label1, {
      opacity: 0, duration: 0.3, ease: 'power2.in'
    }, 6.7);

    // Chunk 2 slides in from right
    tl.to(chunk2, {
      opacity: 1, duration: 0.6, ease: 'power2.out'
    }, 7.0);
    tl.from(chunk2, {
      x: 60, duration: 0.7, ease: 'power3.out'
    }, 7.0);

    // Frame bars for chunk 2
    root.querySelectorAll('.chunk-2 .frame-bar').forEach(function(bar, i) {
      tl.from(bar, {
        scaleY: 0, transformOrigin: 'bottom', duration: 0.3,
        ease: 'back.out(1.8)'
      }, 7.3 + i * 0.06);
    });

    // Overlap zone 1-2 glows in
    tl.to(overlap12, {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 7.4);

    // Pan track slightly left to keep chunk 2 visible
    tl.to(track, {
      x: -100, duration: 1.2, ease: 'power2.inOut'
    }, 7.2);

    // Extend anchor line
    tl.to(anchorLine, {
      width: 860, duration: 0.8, ease: 'power1.inOut'
    }, 7.4);

    // Dotted anchor line from chunk 2
    tl.to(dal2, { opacity: 1, height: 50, duration: 0.5, ease: 'power2.out' }, 7.8);

    // Phase 3 label
    tl.to(label2, {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 8.0);
    tl.from(label2, {
      y: 10, duration: 0.5, ease: 'power2.out'
    }, 8.0);

    // Ambient: overlap pulse
    tl.to(root.querySelector('.overlap-12 .overlap-glow'), {
      opacity: 0.7, duration: 0.8, ease: 'sine.inOut', yoyo: true, repeat: 1
    }, 8.2);


    // ── Phase 4 (10-12s): Chunk 3 + Chunk 4 (partial) ──────────────

    // Fade label 2
    tl.to(label2, {
      opacity: 0, duration: 0.3, ease: 'power2.in'
    }, 9.7);

    // Pan track further left
    tl.to(track, {
      x: -440, duration: 1.5, ease: 'power2.inOut'
    }, 9.8);

    // Chunk 3 enters
    tl.to(chunk3, {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 10.0);
    tl.from(chunk3, {
      x: 50, duration: 0.6, ease: 'power3.out'
    }, 10.0);

    // Frame bars chunk 3
    root.querySelectorAll('.chunk-3 .frame-bar').forEach(function(bar, i) {
      tl.from(bar, {
        scaleY: 0, transformOrigin: 'bottom', duration: 0.25,
        ease: 'back.out(1.5)'
      }, 10.2 + i * 0.05);
    });

    // Overlap 2-3
    tl.to(overlap23, {
      opacity: 1, duration: 0.4, ease: 'power2.out'
    }, 10.3);

    // Anchor line extends
    tl.to(anchorLine, {
      width: 1200, duration: 0.7, ease: 'power1.inOut'
    }, 10.2);

    // Dotted anchor line chunk 3
    tl.to(dal3, { opacity: 1, height: 50, duration: 0.4, ease: 'power2.out' }, 10.5);

    // Chunk 4 (partial) enters quickly
    tl.to(chunk4, {
      opacity: 0.7, duration: 0.5, ease: 'power2.out'
    }, 10.8);
    tl.from(chunk4, {
      x: 40, duration: 0.5, ease: 'power3.out'
    }, 10.8);

    // Overlap 3-4
    tl.to(overlap34, {
      opacity: 0.8, duration: 0.4, ease: 'power2.out'
    }, 11.0);

    // Anchor line final extension
    tl.to(anchorLine, {
      width: 1500, duration: 0.6, ease: 'power1.inOut'
    }, 10.8);

    tl.to(dal4, { opacity: 1, height: 50, duration: 0.4, ease: 'power2.out' }, 11.0);

    // Infinity arrow
    tl.to(infArrow, {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 11.2);
    tl.from(infArrow, {
      x: -20, duration: 0.5, ease: 'power2.out'
    }, 11.2);

    // Ambient overlap pulses on 2-3 and 3-4
    tl.to(root.querySelector('.overlap-23 .overlap-glow'), {
      opacity: 0.7, duration: 0.6, ease: 'sine.inOut', yoyo: true, repeat: 1
    }, 11.0);
    tl.to(root.querySelector('.overlap-34 .overlap-glow'), {
      opacity: 0.7, duration: 0.6, ease: 'sine.inOut', yoyo: true, repeat: 1
    }, 11.3);


    // ── Phase 5 (12-14s): Bottom callout + anchor pulse ────────────

    // Bottom callout
    tl.to(callout, {
      opacity: 1, duration: 0.6, ease: 'power2.out'
    }, 12.0);
    tl.from(callout, {
      y: 16, duration: 0.6, ease: 'power3.out'
    }, 12.0);

    // Anchor line pulses (green glow strengthens)
    tl.to(anchorLine, {
      opacity: 0.9, duration: 0.5, ease: 'sine.inOut'
    }, 12.4);
    tl.to(anchorLine, {
      opacity: 0.4, duration: 0.5, ease: 'sine.inOut'
    }, 12.9);
    tl.to(anchorLine, {
      opacity: 0.8, duration: 0.4, ease: 'sine.inOut'
    }, 13.4);

    // Anchor icon pulses
    tl.to(anchorIcon, {
      scale: 1.15, duration: 0.4, ease: 'sine.inOut', transformOrigin: 'center'
    }, 12.5);
    tl.to(anchorIcon, {
      scale: 1.0, duration: 0.4, ease: 'sine.inOut'
    }, 12.9);
    tl.to(anchorIcon, {
      scale: 1.12, duration: 0.35, ease: 'sine.inOut'
    }, 13.3);
    tl.to(anchorIcon, {
      scale: 1.0, duration: 0.35, ease: 'sine.inOut'
    }, 13.65);

    // Hold to end
    tl.to({}, { duration: 0.1 }, 14.0);

    window.__timelines["chunk-generation"] = tl;
  </script>
</div>
</body>
</html>
