<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="low-rank" data-width="1920" data-height="540" data-start="0" data-duration="12">
  <div class="scene">
    <div class="title">Low-Rank Decomposition</div>
    <div class="subtitle">Instead of updating a huge matrix, update two tiny ones</div>
    <div class="content">
      <!-- Full update -->
      <div class="side">
        <div class="plabel" style="color:#E71D36;">Full Update &Delta;W</div>
        <div class="big-matrix"></div>
        <div class="dim-label">12,288 &times; 12,288</div>
        <div class="param-count" style="color:#E71D36;">150M parameters</div>
      </div>

      <div class="eq-sign">=</div>

      <!-- Low-rank -->
      <div class="side">
        <div class="plabel" style="color:#2EC4B6;">LoRA: B &times; A</div>
        <div class="lr-pair">
          <div class="lr-col">
            <div class="tall-matrix"></div>
            <div class="dim-label">12,288 &times; 4</div>
            <div class="mat-name">B</div>
          </div>
          <div class="times-sign">&times;</div>
          <div class="lr-col">
            <div class="wide-matrix"></div>
            <div class="dim-label">4 &times; 12,288</div>
            <div class="mat-name">A</div>
          </div>
        </div>
        <div class="param-count" style="color:#2EC4B6;">98K parameters (0.07%)</div>
      </div>
    </div>
  </div>

  <style>
    [data-composition-id="low-rank"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { width: 1920px; height: 540px; display: flex; flex-direction: column; align-items: center; }
    .title { font-size: 48px; font-weight: 700; margin-top: 20px; }
    .subtitle { font-size: 24px; color: #778DA9; margin-top: 6px; }
    .content { flex: 1; display: flex; align-items: center; justify-content: center; gap: 60px; padding: 0 100px; }

    .side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .plabel { font-size: 30px; font-weight: 700; }

    .big-matrix { width: 260px; height: 260px; border-radius: 6px; background: rgba(231,29,54,0.2); border: 3px solid #E71D36; }
    .tall-matrix { width: 36px; height: 220px; border-radius: 6px; background: rgba(46,196,182,0.2); border: 3px solid #2EC4B6; }
    .wide-matrix { width: 220px; height: 36px; border-radius: 6px; background: rgba(46,196,182,0.2); border: 3px solid #2EC4B6; }

    .dim-label { font-size: 20px; color: #778DA9; }
    .param-count { font-size: 26px; font-weight: 700; }
    .mat-name { font-size: 28px; font-weight: 700; color: #2EC4B6; }
    .eq-sign { font-size: 56px; color: #415A77; font-weight: 700; }

    .lr-pair { display: flex; align-items: center; gap: 20px; }
    .lr-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .times-sign { font-size: 36px; color: #415A77; font-weight: 700; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });
    tl.from(root.querySelector('.title'), { y: -20, opacity: 0, duration: 0.5 }, 0);
    tl.from(root.querySelector('.subtitle'), { opacity: 0, duration: 0.4 }, 0.3);
    var sides = root.querySelectorAll('.side');
    tl.from(sides[0].querySelector('.plabel'), { opacity: 0, duration: 0.4 }, 0.6);
    tl.from(root.querySelector('.big-matrix'), { opacity: 0, scale: 0.8, duration: 0.7, ease: 'power2.out' }, 0.8);
    tl.from(sides[0].querySelector('.dim-label'), { opacity: 0, duration: 0.3 }, 1.4);
    tl.from(sides[0].querySelector('.param-count'), { opacity: 0, duration: 0.3 }, 1.7);
    tl.from(root.querySelector('.eq-sign'), { opacity: 0, duration: 0.4 }, 2.5);
    tl.from(sides[1].querySelector('.plabel'), { opacity: 0, duration: 0.4 }, 3.0);
    tl.from(root.querySelector('.tall-matrix'), { opacity: 0, scaleY: 0, duration: 0.6, ease: 'power2.out' }, 3.3);
    tl.from(root.querySelector('.times-sign'), { opacity: 0, duration: 0.3 }, 3.7);
    tl.from(root.querySelector('.wide-matrix'), { opacity: 0, scaleX: 0, duration: 0.6, ease: 'power2.out' }, 3.8);
    sides[1].querySelectorAll('.dim-label').forEach(function(el, i) { tl.from(el, { opacity: 0, duration: 0.3 }, 4.4 + i * 0.2); });
    root.querySelectorAll('.mat-name').forEach(function(el, i) { tl.from(el, { opacity: 0, duration: 0.3 }, 4.6 + i * 0.2); });
    tl.from(sides[1].querySelector('.param-count'), { opacity: 0, y: 10, duration: 0.4 }, 5.2);
    tl.to({}, { duration: 3 });
    window.__timelines["low-rank"] = tl;
  </script>
</div>
</body>
</html>
