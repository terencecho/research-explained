<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="multi-head" data-width="1920" data-height="540" data-start="0" data-duration="11">
  <div class="scene">
    <div class="title">Multi-head attention: many views of the same sentence at once</div>

    <div class="stage">
      <!-- Input -->
      <div class="side">
        <div class="slabel">INPUT</div>
        <div class="sbox in">Q&nbsp;K&nbsp;V</div>
        <div class="ssub">one word's<br>query, keys, values</div>
        <div class="split-tag">split into 8 heads &rarr;</div>
      </div>

      <!-- Heads -->
      <div class="heads"></div>

      <!-- Output -->
      <div class="side">
        <div class="concat-tag">&rarr; concat + project</div>
        <div class="slabel">OUTPUT</div>
        <div class="sbox out">one richer vector</div>
        <div class="ssub">all relationships<br>combined</div>
      </div>
    </div>

    <div class="footer-tag">Each head learns a different kind of relationship &mdash; and they all run in parallel</div>
  </div>

  <style>
    [data-composition-id="multi-head"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px;
      font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    [data-composition-id="multi-head"] .scene {
      width: 1920px; height: 540px; display: flex; flex-direction: column;
      align-items: center; padding: 24px 50px 22px;
    }
    [data-composition-id="multi-head"] .title {
      font-size: 40px; font-weight: 700; text-align: center; letter-spacing: 0.5px; margin-bottom: 14px;
    }
    [data-composition-id="multi-head"] .stage {
      flex: 1; width: 100%; max-width: 1820px;
      display: flex; align-items: center; justify-content: center; gap: 30px;
    }
    [data-composition-id="multi-head"] .side {
      display: flex; flex-direction: column; align-items: center; width: 290px; flex-shrink: 0;
    }
    [data-composition-id="multi-head"] .slabel { font-size: 18px; font-weight: 700; color: #778DA9; letter-spacing: 2px; margin-bottom: 10px; }
    [data-composition-id="multi-head"] .sbox {
      font-size: 30px; font-weight: 700; border-radius: 12px; padding: 16px 24px; text-align: center;
    }
    [data-composition-id="multi-head"] .sbox.in { color: #FDFFFC; background: rgba(65,90,119,0.3); border: 2px solid #778DA9; }
    [data-composition-id="multi-head"] .sbox.out { color: #3fb950; background: rgba(63,185,80,0.12); border: 2px solid #3fb950; font-size: 26px; }
    [data-composition-id="multi-head"] .ssub { font-size: 16px; color: #778DA9; margin-top: 10px; text-align: center; line-height: 1.4; }
    [data-composition-id="multi-head"] .split-tag, [data-composition-id="multi-head"] .concat-tag {
      font-size: 19px; font-weight: 700; color: #FF9F1C; margin-top: 18px; text-align: center;
    }
    [data-composition-id="multi-head"] .concat-tag { margin-top: 0; margin-bottom: 18px; color: #3fb950; }
    [data-composition-id="multi-head"] .heads { display: flex; flex-direction: column; gap: 12px; width: 760px; flex-shrink: 0; }
    [data-composition-id="multi-head"] .head {
      display: flex; align-items: center; gap: 18px; background: #0d1b2a;
      border: 1px solid #1b3a4b; border-radius: 10px; padding: 9px 16px;
    }
    [data-composition-id="multi-head"] .hinfo { width: 320px; flex-shrink: 0; }
    [data-composition-id="multi-head"] .hname { font-size: 22px; font-weight: 700; }
    [data-composition-id="multi-head"] .hrel { font-size: 17px; color: #FDFFFC; }
    [data-composition-id="multi-head"] .strip { display: flex; gap: 5px; flex: 1; }
    [data-composition-id="multi-head"] .cell { flex: 1; height: 30px; border-radius: 5px; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var heads = [
      { name: 'Head 1', rel: 'tracks adjacent words', color: '#2EC4B6', dist: [0.10,0.55,0.20,0.05,0.05,0.05] },
      { name: 'Head 3', rel: 'finds the subject', color: '#FF9F1C', dist: [0.62,0.14,0.10,0.05,0.04,0.05] },
      { name: 'Head 5', rel: 'links to the object', color: '#bc8cff', dist: [0.05,0.05,0.60,0.16,0.09,0.05] },
      { name: 'Head 8', rel: 'reaches far-apart words', color: '#58a6ff', dist: [0.42,0.05,0.04,0.04,0.05,0.40] }
    ];
    var container = root.querySelector('.heads');
    heads.forEach(function(h) {
      var card = document.createElement('div');
      card.className = 'head';
      var info = document.createElement('div');
      info.className = 'hinfo';
      info.innerHTML = '<span class="hname" style="color:' + h.color + '">' + h.name + '</span> <span class="hrel">' + h.rel + '</span>';
      var strip = document.createElement('div');
      strip.className = 'strip';
      var max = Math.max.apply(null, h.dist);
      h.dist.forEach(function(v) {
        var c = document.createElement('div');
        c.className = 'cell';
        c.style.background = h.color;
        c.style.opacity = (0.18 + (v / max) * 0.82).toFixed(2);
        if (v === max) c.style.boxShadow = 'inset 0 0 0 2px #FDFFFC';
        strip.appendChild(c);
      });
      card.appendChild(info); card.appendChild(strip);
      container.appendChild(card);
    });

    var q = function(s){ return root.querySelector(s); };
    var qa = function(s){ return root.querySelectorAll(s); };
    var tl = gsap.timeline({ paused: true });
    tl.from(q('.title'), { opacity: 0, y: -18, duration: 0.6 });
    tl.from(q('.side:first-child .sbox'), { opacity: 0, scale: 0.7, duration: 0.5 }, 0.5);
    tl.from(q('.side:first-child .slabel'), { opacity: 0, duration: 0.4 }, 0.5);
    tl.from(q('.side:first-child .ssub'), { opacity: 0, duration: 0.4 }, 0.7);
    tl.from(q('.split-tag'), { opacity: 0, x: -16, duration: 0.5 }, 1.0);
    tl.from(qa('.head'), { opacity: 0, x: -40, duration: 0.5, stagger: 0.28 }, 1.3);
    tl.from(qa('.cell'), { scaleY: 0, transformOrigin: 'center', duration: 0.4, stagger: 0.018 }, 2.0);
    tl.from(q('.concat-tag'), { opacity: 0, x: 16, duration: 0.5 }, 3.6);
    tl.from(q('.side:last-child .slabel'), { opacity: 0, duration: 0.4 }, 3.9);
    tl.from(q('.side:last-child .sbox'), { opacity: 0, scale: 0.7, duration: 0.5 }, 3.9);
    tl.from(q('.side:last-child .ssub'), { opacity: 0, duration: 0.4 }, 4.1);
    tl.from(q('.footer-tag'), { opacity: 0, y: 14, duration: 0.6 }, 4.5);
    // gentle parallel pulse across all heads to stress simultaneity
    tl.to(qa('.head'), { borderColor: '#2EC4B6', duration: 0.7, yoyo: true, repeat: 1 }, 5.0);

    window.__timelines["multi-head"] = tl;
  </script>
</div>
</body>
</html>
