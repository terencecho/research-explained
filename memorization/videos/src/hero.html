<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="memorization-hero" data-width="1920" data-height="540" data-start="0" data-duration="14">
  <div class="scene">
    <div class="bg-gradient"></div>

    <!-- Title -->
    <div class="title" id="title">How Much Do Language Models Memorize?</div>

    <!-- 5 model columns -->
    <div class="models" id="models">
      <div class="model-col" id="m0">
        <div class="model-name">6.8M</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" id="bf0"></div></div></div>
        <div class="bpp-val" id="bv0">0.0</div>
      </div>
      <div class="model-col" id="m1">
        <div class="model-name">68M</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" id="bf1"></div></div></div>
        <div class="bpp-val" id="bv1">0.0</div>
      </div>
      <div class="model-col" id="m2">
        <div class="model-name">680M</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" id="bf2"></div></div></div>
        <div class="bpp-val" id="bv2">0.0</div>
      </div>
      <div class="model-col" id="m3">
        <div class="model-name">1.3B</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" id="bf3"></div></div></div>
        <div class="bpp-val" id="bv3">0.0</div>
      </div>
      <div class="model-col" id="m4">
        <div class="model-name">6.8B</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" id="bf4"></div></div></div>
        <div class="bpp-val" id="bv4">0.0</div>
      </div>
    </div>

    <!-- Horizontal constant line -->
    <div class="constant-line" id="cline">
      <div class="cline-bar"></div>
      <div class="cline-label">3.6 bits/param</div>
    </div>

    <!-- Axis labels -->
    <div class="axis-label axis-y">bits per parameter</div>
    <div class="axis-label axis-x">model size (parameters)</div>

    <!-- Reveal text -->
    <div class="reveal" id="reveal">The same constant — regardless of model size</div>

    <!-- Punchline -->
    <div class="punchline" id="punchline">
      <span class="punch-num">3.6</span> bits/param — a universal capacity constant
    </div>
  </div>

  <style>
    [data-composition-id="memorization-hero"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px; font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    .scene { position: relative; width: 1920px; height: 540px; }

    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 70% at 50% 60%, rgba(46,196,182,0.04) 0%, transparent 70%),
        linear-gradient(180deg, #011627 0%, #021e32 100%);
    }

    .title {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
      font-size: 36px; font-weight: 700; white-space: nowrap; opacity: 0; z-index: 10;
    }

    .models {
      position: absolute; top: 80px; left: 180px; right: 180px;
      height: 310px; display: flex; gap: 48px;
      align-items: flex-end; padding-bottom: 40px;
    }

    .model-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; opacity: 0;
    }

    .model-name {
      font-size: 20px; font-weight: 700; color: #778DA9;
      margin-bottom: 10px;
    }

    .bar-wrap {
      width: 100%; max-width: 160px; height: 220px;
      display: flex; align-items: flex-end;
    }

    .bar-bg {
      width: 100%; height: 220px; border-radius: 8px;
      background: rgba(65,90,119,0.12); border: 1px solid rgba(65,90,119,0.2);
      display: flex; align-items: flex-end; overflow: hidden;
    }

    .bar-fill {
      width: 100%; height: 0; border-radius: 0 0 6px 6px;
      background: linear-gradient(180deg, #2EC4B6, #1a8a80);
      box-shadow: 0 0 16px rgba(46,196,182,0.25);
    }

    .bpp-val {
      font-size: 24px; font-weight: 700; color: #2EC4B6;
      margin-top: 8px; opacity: 0;
    }

    /* Constant line: 3.6/5.0 * 220 = 158px from bar bottom
       bars bottom at: 80 + 310 - 40 = 350px from scene top
       line at: 350 - 158 = 192px from scene top */
    .constant-line {
      position: absolute; left: 160px; right: 160px;
      top: 192px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; z-index: 10;
    }
    .cline-bar {
      flex: 1; height: 3px;
      background: #FF9F1C;
      box-shadow: 0 0 10px rgba(255,159,28,0.4);
    }
    .cline-label {
      font-size: 22px; font-weight: 700; color: #FF9F1C;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,159,28,0.3);
    }

    .axis-label {
      position: absolute; font-size: 16px; font-weight: 400; color: #415A77;
      letter-spacing: 1px; opacity: 0;
    }
    .axis-y {
      left: 60px; top: 200px;
      writing-mode: vertical-rl; transform: rotate(180deg);
    }
    .axis-x {
      bottom: 68px; left: 50%; transform: translateX(-50%);
    }

    .reveal {
      position: absolute; top: 162px; left: 50%; transform: translateX(-50%);
      font-size: 22px; font-weight: 700; color: #FF9F1C;
      white-space: nowrap; opacity: 0; z-index: 10;
    }

    .punchline {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 24px; font-weight: 700; color: #FDFFFC;
      background: rgba(63,185,80,0.08);
      border: 2px solid rgba(63,185,80,0.3);
      border-radius: 10px; padding: 10px 36px;
      white-space: nowrap; opacity: 0; z-index: 10;
    }
    .punch-num { font-size: 36px; color: #3fb950; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var tl = gsap.timeline({ paused: true });

    /* ============================================================
       All 5 models converge to ~3.6 bits/param
       Bar max height: 220px = 5.0 bits/param (scale)
       3.6 bits = 3.6/5.0 * 220 = 158.4px
       ============================================================ */
    var maxBpp = 5.0;
    var barMaxH = 220;
    var targetBpp = 3.6;
    var targetH = (targetBpp / maxBpp) * barMaxH;

    var fills = [];
    var vals = [];
    for (var i = 0; i < 5; i++) {
      fills.push(root.querySelector('#bf' + i));
      vals.push(root.querySelector('#bv' + i));
    }

    /* ============================================================
       PHASE 1 (0-2s): Title + columns appear
       ============================================================ */
    tl.to(root.querySelector('#title'), {
      opacity: 1, duration: 0.6, ease: 'power3.out'
    }, 0.2);
    tl.from(root.querySelector('#title'), {
      y: -20, duration: 0.6, ease: 'power3.out'
    }, 0.2);

    tl.to(root.querySelector('.axis-y'), { opacity: 1, duration: 0.4 }, 0.8);
    tl.to(root.querySelector('.axis-x'), { opacity: 1, duration: 0.4 }, 0.8);

    for (var i = 0; i < 5; i++) {
      (function(idx) {
        var col = root.querySelector('#m' + idx);
        tl.to(col, { opacity: 1, duration: 0.3, ease: 'power2.out' }, 1.2 + idx * 0.2);
        tl.from(col, { y: 20, duration: 0.4, ease: 'power2.out' }, 1.2 + idx * 0.2);
      })(i);
    }

    /* ============================================================
       PHASE 2 (2.5-7s): Bars fill — all land on 3.6
       ============================================================ */
    var starts = [2.5, 3.0, 3.5, 4.0, 4.5];

    for (var i = 0; i < 5; i++) {
      (function(idx) {
        var proxy = { v: 0 };

        tl.to(fills[idx], {
          height: targetH, duration: 1.5, ease: 'power2.out'
        }, starts[idx]);

        tl.to(vals[idx], { opacity: 1, duration: 0.2 }, starts[idx]);

        tl.to(proxy, {
          v: targetBpp, duration: 1.5, ease: 'power2.out',
          onUpdate: function() {
            vals[idx].textContent = proxy.v.toFixed(1);
          }
        }, starts[idx]);
      })(i);
    }

    /* ============================================================
       PHASE 3 (7-9s): Constant line + reveal
       ============================================================ */
    tl.to(root.querySelector('#cline'), {
      opacity: 1, duration: 0.6, ease: 'power2.out'
    }, 7.0);
    tl.from(root.querySelector('.cline-bar'), {
      scaleX: 0, transformOrigin: 'left center', duration: 0.8, ease: 'expo.out'
    }, 7.0);

    tl.to(root.querySelector('#reveal'), {
      opacity: 1, duration: 0.5, ease: 'power2.out'
    }, 7.5);

    // Flash bars orange then back
    for (var i = 0; i < 5; i++) {
      tl.to(vals[i], { color: '#FF9F1C', duration: 0.3 }, 7.2);
      tl.to(vals[i], { color: '#2EC4B6', duration: 0.5 }, 8.0);
      tl.to(fills[i], {
        boxShadow: '0 0 24px rgba(255,159,28,0.4)', duration: 0.3
      }, 7.2);
      tl.to(fills[i], {
        boxShadow: '0 0 16px rgba(46,196,182,0.25)', duration: 0.5
      }, 8.0);
    }

    /* ============================================================
       PHASE 4 (9.5-14s): Punchline + hold
       ============================================================ */
    tl.to(root.querySelector('#punchline'), {
      opacity: 1, duration: 0.01
    }, 9.5);
    tl.from(root.querySelector('#punchline'), {
      y: 15, scale: 0.93, duration: 0.6, ease: 'back.out(1.5)'
    }, 9.5);

    tl.to(root.querySelector('#punchline'), {
      boxShadow: '0 0 20px rgba(63,185,80,0.25)',
      duration: 0.8, ease: 'sine.inOut'
    }, 10.5);
    tl.to(root.querySelector('#punchline'), {
      boxShadow: '0 0 6px rgba(63,185,80,0.1)',
      duration: 0.8, ease: 'sine.inOut'
    }, 11.3);

    tl.to({}, { duration: 0.5 }, 13.5);

    window.__timelines["memorization-hero"] = tl;
  </script>
</div>
</body>
</html>
