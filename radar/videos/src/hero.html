<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="radar-hero" data-width="1920" data-height="540" data-start="0" data-duration="11">
  <div class="scene">
    <div class="title">Code is created faster than humans can review it</div>

    <div class="chart">
      <!-- Created column -->
      <div class="col">
        <div class="bar-wrap">
          <div class="bar created">
            <div class="seg ai"><span class="seg-label">agentic AI</span></div>
            <div class="seg human"><span class="seg-label">human</span></div>
          </div>
        </div>
        <div class="col-label">DIFFS CREATED</div>
        <div class="col-sub">+51% / dev / month &middot; 80%+ from AI</div>
      </div>

      <!-- gap -->
      <div class="gap-col">
        <div class="gap-wedge"><span class="gap-label">REVIEW<br>BACKLOG</span></div>
      </div>

      <!-- Review column -->
      <div class="col">
        <div class="bar-wrap">
          <div class="bar reviewed"></div>
        </div>
        <div class="col-label">HUMAN REVIEW CAPACITY</div>
        <div class="col-sub">flat &mdash; bounded by attention</div>
      </div>
    </div>

    <div class="footer-tag">RADAR: auto-review the low-risk diffs, free humans for the rest</div>
  </div>

  <style>
    [data-composition-id="radar-hero"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px;
      font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    [data-composition-id="radar-hero"] .scene {
      width: 1920px; height: 540px;
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 60px 30px;
    }
    [data-composition-id="radar-hero"] .title {
      font-size: 40px; font-weight: 700; text-align: center; letter-spacing: 1px;
      margin-bottom: 10px;
    }
    [data-composition-id="radar-hero"] .chart {
      flex: 1; width: 100%; max-width: 1300px;
      display: flex; align-items: flex-end; justify-content: center; gap: 70px;
      padding-bottom: 6px;
    }
    [data-composition-id="radar-hero"] .col {
      display: flex; flex-direction: column; align-items: center; width: 320px;
    }
    [data-composition-id="radar-hero"] .bar-wrap {
      height: 232px; display: flex; align-items: flex-end;
    }
    [data-composition-id="radar-hero"] .bar {
      width: 150px; border-radius: 8px 8px 0 0; transform-origin: bottom; overflow: hidden;
      display: flex; flex-direction: column;
    }
    [data-composition-id="radar-hero"] .bar.created { height: 232px; }
    [data-composition-id="radar-hero"] .bar.reviewed {
      height: 96px; background: #415A77; border: 2px solid #5b7a9e;
    }
    [data-composition-id="radar-hero"] .seg { display: flex; align-items: center; justify-content: center; }
    [data-composition-id="radar-hero"] .seg.ai { height: 62%; background: #FF9F1C; }
    [data-composition-id="radar-hero"] .seg.human { height: 38%; background: #2EC4B6; }
    [data-composition-id="radar-hero"] .seg-label { font-size: 20px; font-weight: 700; color: #011627; }
    [data-composition-id="radar-hero"] .col-label { font-size: 24px; font-weight: 700; margin-top: 18px; letter-spacing: 1px; text-align: center; }
    [data-composition-id="radar-hero"] .col-sub { font-size: 17px; color: #778DA9; margin-top: 6px; text-align: center; }

    [data-composition-id="radar-hero"] .gap-col {
      height: 232px; display: flex; align-items: flex-end; width: 200px;
    }
    [data-composition-id="radar-hero"] .gap-wedge {
      width: 100%; height: 140px; background: rgba(231,29,54,0.18);
      border: 2px dashed #E71D36; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    [data-composition-id="radar-hero"] .gap-label {
      font-size: 24px; font-weight: 700; color: #E71D36; text-align: center; letter-spacing: 1px;
    }
    [data-composition-id="radar-hero"] .footer-tag {
      font-size: 26px; color: #2EC4B6; font-weight: 700; text-align: center; letter-spacing: 0.5px;
      margin-top: 8px; flex-shrink: 0;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var q = function(s){ return root.querySelector(s); };
    var tl = gsap.timeline({ paused: true });

    tl.from(q('.title'), { opacity: 0, y: -20, duration: 0.6 });
    tl.from(q('.bar.reviewed'), { scaleY: 0, transformOrigin: 'bottom', duration: 0.8, ease: 'power2.out' }, 0.4);
    tl.from(q('.bar.created'), { scaleY: 0, transformOrigin: 'bottom', duration: 1.1, ease: 'power2.out' }, 0.7);
    tl.from(root.querySelectorAll('.seg-label'), { opacity: 0, duration: 0.5, stagger: 0.15 }, 1.4);
    tl.from(root.querySelectorAll('.col-label, .col-sub'), { opacity: 0, y: 10, duration: 0.5, stagger: 0.1 }, 1.2);
    tl.from(q('.gap-wedge'), { scaleY: 0, transformOrigin: 'bottom', opacity: 0, duration: 0.9, ease: 'power2.out' }, 2.0);
    tl.from(q('.gap-label'), { opacity: 0, duration: 0.5 }, 2.7);
    // pulse the gap to emphasize "growing"
    tl.to(q('.gap-wedge'), { height: 192, duration: 1.2, ease: 'power1.inOut' }, 3.2);
    tl.from(q('.footer-tag'), { opacity: 0, y: 16, duration: 0.7 }, 4.4);
    tl.to(q('.footer-tag'), { opacity: 0.6, duration: 0.8, yoyo: true, repeat: 1 }, 5.4);

    window.__timelines["radar-hero"] = tl;
  </script>
</div>
</body>
</html>
