<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div data-composition-id="frame-budget" data-width="1920" data-height="540" data-start="0" data-duration="11">
  <div class="scene">
    <div class="title">A captioner sees only one frame &mdash; which one?</div>

    <div class="filmstrip" id="strip"></div>
    <div class="striplabel">a 2-minute video &middot; sampled into candidate frames</div>

    <div class="selectors">
      <div class="sel-card uniform" id="uni-card">
        <div class="sel-head">UNIFORM &middot; takes the center frame</div>
        <div class="sel-body">
          <div class="pick-tile" id="uni-tile">&#128106;</div>
          <div class="sel-cap">
            <div class="cap-q">&ldquo;A woman holds a tissue to her nose.&rdquo;</div>
            <div class="verdict bad">&#10007;&nbsp; missed the event</div>
          </div>
        </div>
      </div>

      <div class="sel-card peek" id="peek-card">
        <div class="sel-head">PEEK &middot; takes the most relevant frame</div>
        <div class="sel-body">
          <div class="pick-tile teal" id="peek-tile">&#127930;</div>
          <div class="sel-cap">
            <div class="cap-q">&ldquo;A man plays the bagpipes for a crowd.&rdquo;</div>
            <div class="verdict good">&#10003;&nbsp; found the event</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    [data-composition-id="frame-budget"] {
      position: relative; overflow: hidden; background: #011627;
      width: 1920px; height: 540px;
      font-family: 'Space Mono', monospace; color: #FDFFFC;
    }
    [data-composition-id="frame-budget"] .scene {
      width: 1920px; height: 540px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; padding: 24px 50px 30px;
    }
    [data-composition-id="frame-budget"] .title { font-size: 46px; font-weight: 700; text-align: center; }
    [data-composition-id="frame-budget"] .filmstrip { display: flex; gap: 10px; }
    [data-composition-id="frame-budget"] .frame {
      width: 132px; height: 96px; border-radius: 10px; background: #0d2137;
      border: 2px solid #21405e; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
    }
    [data-composition-id="frame-budget"] .frame .emo { font-size: 40px; line-height: 1; }
    [data-composition-id="frame-budget"] .frame .ts { font-size: 16px; color: #778DA9; }
    [data-composition-id="frame-budget"] .frame.key { border-color: #2EC4B6; }
    [data-composition-id="frame-budget"] .striplabel { font-size: 20px; color: #778DA9; }
    [data-composition-id="frame-budget"] .selectors { display: flex; gap: 36px; margin-top: 6px; }
    [data-composition-id="frame-budget"] .sel-card {
      width: 620px; border-radius: 14px; padding: 16px 22px; border: 2px solid;
    }
    [data-composition-id="frame-budget"] .sel-card.uniform { border-color: #FF9F1C; background: rgba(255,159,28,0.06); }
    [data-composition-id="frame-budget"] .sel-card.peek { border-color: #2EC4B6; background: rgba(46,196,182,0.06); }
    [data-composition-id="frame-budget"] .sel-head { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    [data-composition-id="frame-budget"] .sel-card.uniform .sel-head { color: #FF9F1C; }
    [data-composition-id="frame-budget"] .sel-card.peek .sel-head { color: #2EC4B6; }
    [data-composition-id="frame-budget"] .sel-body { display: flex; align-items: center; gap: 18px; }
    [data-composition-id="frame-budget"] .pick-tile {
      width: 110px; height: 84px; border-radius: 10px; background: #0d2137;
      border: 2px solid #FF9F1C; display: flex; align-items: center; justify-content: center;
      font-size: 46px; flex-shrink: 0;
    }
    [data-composition-id="frame-budget"] .pick-tile.teal { border-color: #2EC4B6; }
    [data-composition-id="frame-budget"] .sel-cap { flex: 1; }
    [data-composition-id="frame-budget"] .cap-q { font-size: 22px; line-height: 1.35; margin-bottom: 8px; }
    [data-composition-id="frame-budget"] .verdict { font-size: 22px; font-weight: 700; }
    [data-composition-id="frame-budget"] .verdict.bad { color: #E71D36; }
    [data-composition-id="frame-budget"] .verdict.good { color: #2EC4B6; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var root = document.currentScript.parentElement;
    var frames = [
      {e:'🛋️', t:'0:08'}, {e:'👥', t:'0:24'}, {e:'🛋️', t:'0:39'},
      {e:'👤', t:'0:55'}, {e:'🛋️', t:'1:02'}, {e:'🎺', t:'1:18'},
      {e:'👏', t:'1:31'}, {e:'👥', t:'1:46'}, {e:'🚪', t:'1:58'}
    ];
    var KEY = 5, CENTER = 4;
    var strip = root.querySelector('#strip');
    frames.forEach(function(f, i) {
      var d = document.createElement('div');
      d.className = 'frame' + (i === KEY ? ' key' : '');
      d.innerHTML = '<div class="emo">' + f.e + '</div><div class="ts">' + f.t + '</div>';
      strip.appendChild(d);
    });
    var frameEls = strip.querySelectorAll('.frame');

    var tl = gsap.timeline({ paused: true });
    tl.from(root.querySelector('.title'), { opacity: 0, y: -18, duration: 0.6 });
    tl.from(frameEls, { opacity: 0, scale: 0.5, transformOrigin: 'center', duration: 0.4, stagger: 0.08 }, 0.5);
    tl.from(root.querySelector('.striplabel'), { opacity: 0, duration: 0.4 }, 1.3);
    // highlight the moment
    tl.fromTo(frameEls[KEY], { boxShadow: '0 0 0px rgba(46,196,182,0)' },
      { boxShadow: '0 0 26px rgba(46,196,182,0.9)', duration: 0.5, repeat: 1, yoyo: true }, 1.8);
    // uniform: ring the center frame orange, reveal card
    tl.to(frameEls[CENTER], { borderColor: '#FF9F1C', duration: 0.3 }, 2.9);
    tl.from(root.querySelector('#uni-card'), { opacity: 0, y: 24, duration: 0.55 }, 3.0);
    // peek: ring the key frame teal, reveal card
    tl.to(frameEls[KEY], { borderColor: '#2EC4B6', duration: 0.3 }, 5.4);
    tl.from(root.querySelector('#peek-card'), { opacity: 0, y: 24, duration: 0.55 }, 5.5);
    tl.from(root.querySelector('#peek-card .verdict'), { scale: 0.6, opacity: 0, transformOrigin: 'left center', duration: 0.5, ease: 'back.out(2)' }, 6.2);

    window.__timelines["frame-budget"] = tl;
  </script>
</div>
</body>
</html>
